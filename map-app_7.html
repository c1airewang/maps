<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e8eaf0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  #topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#161b27;border-bottom:1px solid #2a2f3e;flex-shrink:0;flex-wrap:wrap}
  #topbar h1{font-size:15px;font-weight:600;color:#e8eaf0;letter-spacing:.3px;margin-right:4px}
  .tb-btn{background:#1e2535;border:1px solid #2a3045;color:#c5c9d6;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s}
  .tb-btn:hover{background:#252d40;color:#e8eaf0}
  .tb-btn.primary{background:#2563eb;border-color:#3b7af8;color:#fff}
  .tb-btn.primary:hover{background:#1d55d4}
  .spacer{flex:1}
  #map{flex:1}
  #sidebar{position:absolute;top:52px;right:0;width:340px;height:calc(100vh - 52px);background:#161b27;border-left:1px solid #2a2f3e;z-index:1000;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
  #sidebar.open{transform:translateX(0)}
  .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #2a2f3e;flex-shrink:0}
  .sidebar-header h2{font-size:14px;font-weight:600;color:#e8eaf0}
  .close-btn{background:none;border:none;color:#6b7280;cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px}
  .close-btn:hover{background:#1e2535;color:#e8eaf0}
  .sidebar-body{padding:14px 16px;flex:1}
  label{display:block;font-size:12px;color:#9ca3af;margin-bottom:4px;margin-top:10px}
  input[type=text],input[type=url],input[type=password],select,textarea{width:100%;background:#1e2535;border:1px solid #2a3045;color:#e8eaf0;padding:7px 10px;border-radius:6px;font-size:13px;outline:none;transition:border .15s}
  input:focus,select:focus,textarea:focus{border-color:#2563eb}
  textarea{resize:vertical;min-height:60px}
  .form-actions{display:flex;gap:8px;margin-top:16px}
  .btn{padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid transparent;transition:background .15s}
  .btn-primary{background:#2563eb;color:#fff;border-color:#3b7af8}
  .btn-primary:hover{background:#1d55d4}
  .btn-secondary{background:#1e2535;color:#c5c9d6;border-color:#2a3045}
  .btn-secondary:hover{background:#252d40}
  .btn-danger{background:transparent;color:#f87171;border-color:#7f1d1d}
  .btn-danger:hover{background:#7f1d1d22}
  #pin-list{list-style:none;margin-top:4px}
  .pin-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .15s}
  .pin-item:hover{background:#1e2535}
  .pin-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .pin-name{font-size:13px;color:#c5c9d6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pin-cat{font-size:10px;padding:2px 6px;border-radius:10px;background:#1e2535;color:#6b7280;white-space:nowrap}
  #legend{position:absolute;bottom:24px;left:16px;z-index:999;background:#ffffffee;border:1px solid #d1d5db;border-radius:8px;padding:10px 14px;backdrop-filter:blur(6px);max-width:210px;display:none}
  .legend-section-title{font-size:10px;font-weight:600;color:#6b7280;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;margin-top:8px}
  .legend-section-title:first-child{margin-top:0}
  .legend-divider{border:none;border-top:1px solid #e5e7eb;margin:8px 0}
  .legend-item{display:flex;align-items:center;gap:7px;margin:4px 0;font-size:12px;color:#374151;cursor:pointer;user-select:none}
  .legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .legend-swatch{width:14px;height:10px;border-radius:2px;flex-shrink:0;border:1px solid #0002}
  .legend-item.muted{opacity:.35}
  #modal-overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:2000;align-items:center;justify-content:center}
  #modal-overlay.show{display:flex}
  .modal{background:#161b27;border:1px solid #2a2f3e;border-radius:10px;padding:24px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:6px}
  .modal p{font-size:13px;color:#9ca3af;margin-bottom:8px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  #toast{position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:3000;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none}
  #toast.show{opacity:1;transform:translateY(0)}
  #toast.error{background:#ef4444}
  #geocode-status{font-size:11px;color:#6b7280;margin-top:4px;min-height:14px}
  .section-title{font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.6px;text-transform:uppercase;margin:18px 0 8px}
  .leaflet-popup-content-wrapper{background:#161b27;border:1px solid #2a2f3e;border-radius:8px;box-shadow:0 4px 24px #0008;color:#e8eaf0}
  .leaflet-popup-tip{background:#161b27}
  .popup-name{font-size:14px;font-weight:600;margin-bottom:4px}
  .popup-addr{font-size:12px;color:#9ca3af;margin-bottom:8px}
  .popup-cat{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:8px}
  .popup-link{display:block;font-size:12px;color:#60a5fa;word-break:break-all}
  .popup-link:hover{color:#93c5fd}
  .popup-actions{display:flex;gap:6px;margin-top:10px;border-top:1px solid #2a2f3e;padding-top:8px}
  .popup-btn{background:#1e2535;border:1px solid #2a3045;color:#c5c9d6;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer}
  .popup-btn:hover{background:#252d40}
  .popup-btn.red{color:#f87171;border-color:#7f1d1d}
  .popup-btn.red:hover{background:#7f1d1d33}
  .state-popup-name{font-size:13px;font-weight:600;margin-bottom:4px;color:#e8eaf0}
  .state-popup-cat{font-size:12px;color:#9ca3af}
  /* Excel format guide */
  .sheet-guide{background:#1a2030;border:1px solid #2a3045;border-radius:6px;padding:12px 14px;margin:10px 0;font-size:12px;line-height:1.7}
  .sheet-guide strong{color:#c5c9d6;display:block;margin-bottom:4px}
  .sheet-guide code{background:#0d1117;color:#7dd3fc;padding:1px 5px;border-radius:3px;font-size:11px}
  .tab-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px}
</style>
</head>
<body>

<div id="topbar">
  <h1>📍 Location Map</h1>
  <button class="tb-btn primary" onclick="openSidebar('add')">+ Add Location</button>
  <button class="tb-btn" onclick="openSidebar('list')">☰ List View</button>
  <label class="tb-btn" style="margin:0">
    ⬆ Import Excel
    <input type="file" accept=".xlsx,.xls" id="xlsx-input" style="display:none" onchange="handleXLSX(event)">
  </label>
  <button class="tb-btn" onclick="showFormatGuide()">📋 Format Guide</button>
  <button class="tb-btn" onclick="exportCSV()">⬇ Export CSV</button>
  <div class="spacer"></div>
  <button class="tb-btn" onclick="openSettings()">⚙ Settings</button>
</div>

<div id="map"></div>
<div id="legend"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <h2 id="sidebar-title">Add Location</h2>
    <button class="close-btn" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-body" id="sidebar-body"></div>
</div>

<div id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>
<div id="toast"></div>

<script>
const PASS_KEY = 'mapapp_password';
const DATA_KEY = 'mapapp_locations';
const CAT_KEY  = 'mapapp_categories';   // [{name, color}]
const REGIONS_KEY = 'mapapp_regions';   // {stateName: {category, color}}
const REGION_CATS_KEY = 'mapapp_region_cats'; // [{name, color}]

// Fallback palette if no cell color found
const FALLBACK_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899','#f43f5e','#06b6d4'];

let locations      = JSON.parse(localStorage.getItem(DATA_KEY)||'[]');
// categories: [{name: string, color: string}]
let categories     = JSON.parse(localStorage.getItem(CAT_KEY)||'[]');
if(!categories.length) categories = [{name:'Our Locations',color:'#3b82f6'},{name:'Partners',color:'#22c55e'},{name:'Prospects',color:'#f97316'},{name:'Competitors',color:'#ef4444'}];
let hiddenCats     = new Set();
let markers        = {};
let editingId      = null;

// regions: { stateName -> {category, color} }
let regions        = JSON.parse(localStorage.getItem(REGIONS_KEY)||'{}');
// regionCategories: [{name, color}]
let regionCategories = JSON.parse(localStorage.getItem(REGION_CATS_KEY)||'[]');
let hiddenRegionCats = new Set();
let stateLayerGroup  = L.layerGroup();
let statesGeoJSON    = null;
let stateLayerMap    = {};

// ── Map init ─────────────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:true}).setView([39.5,-98.35],4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:19}).addTo(map);
stateLayerGroup.addTo(map);

// ── US states TopoJSON ────────────────────────────────────────────────────────
fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
  .then(r=>r.json()).then(topo=>{ statesGeoJSON=topoToGeo(topo,topo.objects.states); renderStateLayer(); })
  .catch(()=>console.warn('Could not load states GeoJSON'));

function topoToGeo(topo,obj){
  const sc=topo.transform?topo.transform.scale:[1,1];
  const tr=topo.transform?topo.transform.translate:[0,0];
  function decodeArc(arc){let x=0,y=0;return arc.map(p=>{x+=p[0];y+=p[1];return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});}
  function arcRing(idxs){let c=[];for(const i of idxs){const a=i<0?decodeArc(topo.arcs[~i]).reverse():decodeArc(topo.arcs[i]);c=c.concat(a.slice(0,-1));}return c;}
  return{type:'FeatureCollection',features:obj.geometries.map(g=>{
    let geo;
    if(g.type==='Polygon') geo={type:'Polygon',coordinates:g.arcs.map(arcRing)};
    else if(g.type==='MultiPolygon') geo={type:'MultiPolygon',coordinates:g.arcs.map(p=>p.map(arcRing))};
    return{type:'Feature',properties:g.properties||{id:g.id},geometry:geo};
  })};
}

const FIPS={
  "01":"Alabama","02":"Alaska","04":"Arizona","05":"Arkansas","06":"California",
  "08":"Colorado","09":"Connecticut","10":"Delaware","11":"District of Columbia",
  "12":"Florida","13":"Georgia","15":"Hawaii","16":"Idaho","17":"Illinois",
  "18":"Indiana","19":"Iowa","20":"Kansas","21":"Kentucky","22":"Louisiana",
  "23":"Maine","24":"Maryland","25":"Massachusetts","26":"Michigan","27":"Minnesota",
  "28":"Mississippi","29":"Missouri","30":"Montana","31":"Nebraska","32":"Nevada",
  "33":"New Hampshire","34":"New Jersey","35":"New Mexico","36":"New York",
  "37":"North Carolina","38":"North Dakota","39":"Ohio","40":"Oklahoma","41":"Oregon",
  "42":"Pennsylvania","44":"Rhode Island","45":"South Carolina","46":"South Dakota",
  "47":"Tennessee","48":"Texas","49":"Utah","50":"Vermont","51":"Virginia",
  "53":"Washington","54":"West Virginia","55":"Wisconsin","56":"Wyoming"
};
const ABBR_TO_NAME={
  AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",
  CT:"Connecticut",DE:"Delaware",DC:"District of Columbia",FL:"Florida",GA:"Georgia",
  HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",
  LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",
  MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",
  NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",
  OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",
  SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",
  WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"
};
function normState(s){
  const t=s.trim();
  const up=t.toUpperCase();
  if(ABBR_TO_NAME[up]) return ABBR_TO_NAME[up];
  for(const v of Object.values(FIPS)) if(v.toLowerCase()===t.toLowerCase()) return v;
  return t;
}

// ── Color helpers ─────────────────────────────────────────────────────────────
function catColor(catName){
  const c=categories.find(c=>c.name===catName);
  return c?c.color:(FALLBACK_COLORS[categories.length%FALLBACK_COLORS.length]);
}
function regionColor(stateName){
  return regions[stateName]?.color||'#3b82f6';
}
function regionCat(stateName){
  return regions[stateName]?.category||'';
}

// Extract hex color from SheetJS cell style
// SheetJS stores fgColor as {rgb:"AARRGGBB"} or {theme:N, tint:T} or {indexed:N}
// Excel indexed colors (partial):
const EXCEL_INDEXED=['#000000','#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff',
  '#000000','#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff',
  '#800000','#008000','#000080','#808000','#800080','#008080','#c0c0c0','#808080',
  '#9999ff','#993366','#ffffcc','#ccffff','#660066','#ff8080','#0066cc','#ccccff',
  '#000080','#ff00ff','#ffff00','#00ffff','#800080','#800000','#008080','#0000ff',
  '#00ccff','#ccffff','#ccffcc','#ffff99','#99ccff','#ff99cc','#cc99ff','#ffcc99',
  '#3366ff','#33cccc','#99cc00','#ffcc00','#ff9900','#ff6600','#666699','#969696',
  '#003366','#339966','#003300','#333300','#993300','#993366','#333399','#333333'];

function themeColor(theme,tint){
  // Approximate Office theme colors (Office default theme)
  const THEMES=['#ffffff','#000000','#e7e6e6','#44546a','#4472c4','#ed7d31','#a9d18e','#ffc000','#ff0000','#00b0f0'];
  const base=THEMES[theme]||'#888888';
  if(!tint||tint===0) return base;
  // Apply tint: positive = lighten, negative = darken
  const r=parseInt(base.slice(1,3),16),g=parseInt(base.slice(3,5),16),b=parseInt(base.slice(5,7),16);
  const t=tint>0?tint:-tint;
  const mix=(c,light)=>tint>0?Math.round(c+(255-c)*t):Math.round(c*(1-t));
  return '#'+[mix(r),mix(g),mix(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function cellFillColor(cell){
  if(!cell||!cell.s) return null;
  function parseColor(c){
    if(!c) return null;
    if(c.rgb){
      const raw=c.rgb.toUpperCase();
      // Transparent / no fill signals
      if(raw==='00000000'||raw==='FFFFFFFF'||raw==='00FFFFFF') return null;
      if(raw.length===8){
        if(raw.slice(0,2)==='00') return null; // alpha=0 => transparent
        return '#'+raw.slice(2).toLowerCase();
      }
      if(raw.length===6) return '#'+raw.toLowerCase();
    }
    if(typeof c.indexed==='number'){
      if(c.indexed===64||c.indexed===65) return null; // default/transparent
      return EXCEL_INDEXED[c.indexed]||null;
    }
    if(typeof c.theme==='number'){
      // Theme 0=white, 1=black — skip these as they indicate no intentional fill
      if(c.theme===0||c.theme===1) return null;
      return themeColor(c.theme, c.tint||0);
    }
    return null;
  }
  // fgColor holds the solid fill color in Excel; bgColor is pattern background
  const fgCol=parseColor(cell.s.fgColor);
  if(fgCol) return fgCol;
  if(cell.s.patternType==='solid') return parseColor(cell.s.bgColor);
  return null;
}

// ── SheetJS helpers ───────────────────────────────────────────────────────────
function readSheet(wb, nameHints){
  // Find sheet by partial name match
  for(const hint of nameHints){
    const name=wb.SheetNames.find(n=>n.toLowerCase().includes(hint.toLowerCase()));
    if(name) return {sheet:wb.Sheets[name],name};
  }
  return null;
}

function sheetCell(sheet, col, row){
  // col: 0-based column index, row: 0-based row index
  const addr=XLSX.utils.encode_cell({c:col,r:row});
  return sheet[addr]||null;
}

function sheetVal(sheet, col, row){
  const cell=sheetCell(sheet,col,row);
  return cell?String(cell.v||'').trim():'';
}

function sheetRange(sheet){
  const ref=sheet['!ref'];
  if(!ref) return {s:{c:0,r:0},e:{c:0,r:0}};
  return XLSX.utils.decode_range(ref);
}

// ── Parse Categories sheet ────────────────────────────────────────────────────
// Layout: Row 1 = header (skipped). Then pairs of rows per category:
//   Row A: category name in col A (text)
//   Row B: color swatch cell in col A (fill color read here)
// Alternatively accept single-row: col A = name, col B = optional hex color text
function parseCategoriesSheet(sheet){
  const range=sheetRange(sheet);
  const cats=[];
  let r=1; // skip header row 0
  while(r<=range.e.r){
    const nameCell=sheetCell(sheet,0,r);
    if(!nameCell||!nameCell.v){r++;continue;}
    const name=String(nameCell.v).trim();
    if(!name){r++;continue;}
    // Try to get color from this cell's fill first
    let color=cellFillColor(nameCell);
    // If no fill on name cell, check next row same col (the "swatch" row)
    if(!color&&r+1<=range.e.r){
      const swatchCell=sheetCell(sheet,0,r+1);
      const nextVal=swatchCell?String(swatchCell.v||'').trim():'';
      // If next row's A cell is blank or looks like a color, treat as swatch
      if(!nextVal||nextVal.startsWith('#')){
        if(nextVal.startsWith('#')) color=nextVal;
        else color=cellFillColor(swatchCell);
        r+=2; // consumed both rows
      } else {
        r+=1;
      }
    } else {
      r+=1;
    }
    // Check col B for hex text fallback
    if(!color){
      const hexCell=sheetCell(sheet,1,r-1)||sheetCell(sheet,1,r-2);
      if(hexCell&&hexCell.v&&String(hexCell.v).trim().startsWith('#')) color=String(hexCell.v).trim();
    }
    cats.push({name, color: color||FALLBACK_COLORS[cats.length%FALLBACK_COLORS.length]});
  }
  return cats;
}

// ── Parse Locations sheet ─────────────────────────────────────────────────────
// Row 0 = headers. Columns auto-detected by header name.
function parseLocationsSheet(sheet){
  const rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
  return rows;
}

// ── Parse Regions sheet ───────────────────────────────────────────────────────
// Row 0 = header. Col A = state name/abbr (fill = shading color).
// Col B = optional category label. States with no fill color are skipped.
function parseRegionsSheet(sheet){
  const range=sheetRange(sheet);
  const result={}; // stateName -> {category, color}
  const regionCats={}; // catName -> color
  let skipped=0;
  for(let r=1;r<=range.e.r;r++){
    const stateCell=sheetCell(sheet,0,r);
    if(!stateCell||!stateCell.v) continue;
    const stateName=normState(String(stateCell.v).trim());
    if(!stateName) continue;

    // Get fill color — if none, this state has no shading, skip it
    const catCell=sheetCell(sheet,1,r);
    const color=cellFillColor(stateCell)||cellFillColor(catCell);
    if(!color){skipped++;continue;}

    // Category: col B text, or reuse an existing cat with same color, or use color as key
    let catName='';
    if(catCell&&catCell.v) catName=String(catCell.v).trim();
    // If no label, group by color so same-colored states share a legend entry
    if(!catName){
      const existing=Object.entries(regionCats).find(([,c])=>c===color);
      catName=existing?existing[0]:'Region '+Object.keys(regionCats).length+1;
    }

    result[stateName]={category:catName, color};
    if(!regionCats[catName]) regionCats[catName]=color;
  }
  console.log('Regions parsed:',Object.keys(result).length,'shaded,',skipped,'skipped (no fill)');
  return{regions:result, regionCats:Object.entries(regionCats).map(([name,color])=>({name,color}))};
}

// ── Main XLSX import ──────────────────────────────────────────────────────────
function handleXLSX(e){
  const file=e.target.files[0];
  if(!file){return;}
  requireAuth(async()=>{
    const buf=await file.arrayBuffer();
    // cellStyles:true is required to read fill colors
    const wb=XLSX.read(buf,{type:'array',cellStyles:true});

    // ── Tab 1: Categories & Colors ──
    const catSheetInfo=readSheet(wb,['cat','color','legend','type']);
    if(catSheetInfo){
      const parsed=parseCategoriesSheet(catSheetInfo.sheet);
      if(parsed.length){
        categories=parsed;
        save();
      }
    }

    // ── Tab 3: States / Regions ──
    // Match tab names: "Regions", "States", "Region", "State", "Territory", "Shading"
    const regionSheetInfo=readSheet(wb,['region','state','territory','shade','shading']);
    if(regionSheetInfo){
      const {regions:r,regionCats:rc}=parseRegionsSheet(regionSheetInfo.sheet);
      if(Object.keys(r).length){
        regions=r;
        regionCategories=rc;
        saveRegions();
        console.log('Loaded regions from tab:',regionSheetInfo.name,r);
      } else {
        console.warn('Regions tab found ("'+regionSheetInfo.name+'") but no colored cells detected. Make sure cells have a solid fill color, not a theme or pattern fill.');
        toast('Regions tab found but no fill colors detected — see console for details','error');
      }
    } else {
      console.warn('No regions tab found. Tab names in file:', wb.SheetNames);
    }

    // ── Tab 2: Locations / Addresses ──
    const locSheetInfo=readSheet(wb,['loc','address','data','company','site','place']);
    let added=0,geocoded=0,failed=0;
    if(locSheetInfo){
      const rows=parseLocationsSheet(locSheetInfo.sheet);
      const fields=rows.length?Object.keys(rows[0]):[];
      const nameCol=findCol(fields,['name','company','location','title','org']);
      const addrCol=findCol(fields,['address','addr','street','location']);
      const webCol =findCol(fields,['website','url','web','site','link']);
      const catCol =findCol(fields,['category','type','group','cat','label']);
      const latCol =findCol(fields,['lat','latitude']);
      const lngCol =findCol(fields,['lng','lon','longitude']);
      if(!nameCol||!addrCol){
        toast('Locations sheet needs name/company and address columns','error');
      } else {
        for(const row of rows){
          const name=String(row[nameCol]||'').trim();
          const addr=String(row[addrCol]||'').trim();
          if(!name||!addr) continue;
          let lat=latCol?parseFloat(row[latCol]):NaN;
          let lng=lngCol?parseFloat(row[lngCol]):NaN;
          if(isNaN(lat)||isNaN(lng)){
            try{
              const res=await geocodeAddr(addr);
              if(res){lat=res.lat;lng=res.lng;geocoded++;}
              else{lat=null;lng=null;failed++;}
              await new Promise(r=>setTimeout(r,1100));
            }catch{lat=null;lng=null;failed++;}
          }
          const cat=catCol?String(row[catCol]||'').trim():'';
          // If category from sheet not in our list, add it with fallback color
          if(cat&&!categories.find(c=>c.name===cat))
            categories.push({name:cat,color:FALLBACK_COLORS[categories.length%FALLBACK_COLORS.length]});
          locations.push({
            id:Date.now().toString(36)+Math.random().toString(36).slice(2),
            name, address:addr,
            website:webCol?String(row[webCol]||'').trim():'',
            category:cat||categories[0]?.name||'Uncategorized',
            lat:lat||null, lng:lng||null
          });
          added++;
        }
      }
    }

    save();renderAll();renderStateLayer();
    const parts=[`Imported ${added} locations`];
    if(geocoded) parts.push(`geocoded ${geocoded}`);
    if(failed) parts.push(`${failed} geocode failed`);
    toast(parts.join(', '),failed?'error':null);
  });
  e.target.value='';
}

// ── Geocoding (Nominatim) ─────────────────────────────────────────────────────
async function geocodeAddr(addr){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`,
    {headers:{'Accept-Language':'en','User-Agent':'LocationMapApp/1.0'}});
  const j=await r.json();
  if(j.length) return{lat:parseFloat(j[0].lat),lng:parseFloat(j[0].lon),display:j[0].display_name};
  return null;
}

// ── State layer ───────────────────────────────────────────────────────────────
function renderStateLayer(){
  stateLayerGroup.clearLayers();stateLayerMap={};
  if(!statesGeoJSON||!Object.keys(regions).length) return;
  L.geoJSON(statesGeoJSON,{
    filter:f=>{const n=FIPS[String(f.properties.id).padStart(2,'0')];return n&&regions[n];},
    style:f=>{
      const n=FIPS[String(f.properties.id).padStart(2,'0')];
      const cat=regions[n]?.category;
      const color=regionColor(n);
      const vis=!hiddenRegionCats.has(cat);
      return{fillColor:color,fillOpacity:vis?.28:0,color:vis?color:'transparent',weight:vis?1.5:0,opacity:vis?.7:0};
    },
    onEachFeature:(f,layer)=>{
      const n=FIPS[String(f.properties.id).padStart(2,'0')];
      const cat=regions[n]?.category;
      const color=regionColor(n);
      stateLayerMap[n]=layer;
      layer.bindPopup(`<div class="state-popup-name">${n}</div><div class="state-popup-cat">${cat}</div>`);
      layer.on('mouseover',()=>{if(!hiddenRegionCats.has(cat))layer.setStyle({fillOpacity:.45});});
      layer.on('mouseout',()=>{if(!hiddenRegionCats.has(cat))layer.setStyle({fillOpacity:.28});});
    }
  }).addTo(stateLayerGroup);
  renderLegend();
}

function saveRegions(){
  localStorage.setItem(REGIONS_KEY,JSON.stringify(regions));
  localStorage.setItem(REGION_CATS_KEY,JSON.stringify(regionCategories));
}

// ── Pin rendering ─────────────────────────────────────────────────────────────
function makeIcon(color){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36"><path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="${color}"/><circle cx="14" cy="14" r="5" fill="white" opacity="0.9"/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[28,36],iconAnchor:[14,36],popupAnchor:[0,-38]});
}

function renderMarker(loc){
  if(markers[loc.id]) markers[loc.id].remove();
  if(!loc.lat||!loc.lng) return;
  const color=catColor(loc.category);
  const m=L.marker([loc.lat,loc.lng],{icon:makeIcon(color)}).addTo(map);
  const web=loc.website?`<a href="${loc.website}" target="_blank" class="popup-link">${loc.website}</a>`:'<span style="font-size:12px;color:#6b7280">No website</span>';
  const cs=`background:${color}22;color:${color};`;
  m.bindPopup(`<div style="min-width:200px">
    <div class="popup-name">${loc.name}</div>
    <div class="popup-addr">${loc.address}</div>
    <span class="popup-cat" style="${cs}">${loc.category||'Uncategorized'}</span><br>${web}
    <div class="popup-actions">
      <button class="popup-btn" onclick="editLoc('${loc.id}')">Edit</button>
      <button class="popup-btn red" onclick="confirmDelete('${loc.id}')">Delete</button>
    </div></div>`);
  markers[loc.id]=m;
  applyVisibility();
}

function applyVisibility(){
  locations.forEach(l=>{const m=markers[l.id];if(m)m.setOpacity(hiddenCats.has(l.category)?0:1);});
}

function renderAll(){
  locations.forEach(renderMarker);
  renderLegend();
  const sb=document.getElementById('sidebar');
  if(sb.classList.contains('open')&&document.getElementById('sidebar-title').textContent==='All Locations') renderList();
}

function renderLegend(){
  const el=document.getElementById('legend');
  let html='';
  const hasPins=categories.some(c=>locations.find(l=>l.category===c.name));
  const hasRegions=regionCategories.length>0;
  if(!hasPins&&!hasRegions){el.style.display='none';return;}
  el.style.display='block';
  if(hasPins){
    html+=`<div class="legend-section-title">Locations</div>`;
    categories.forEach(c=>{
      const count=locations.filter(l=>l.category===c.name).length;
      if(!count) return;
      const muted=hiddenCats.has(c.name)?'muted':'';
      html+=`<div class="legend-item ${muted}" onclick="toggleCat('${c.name}')"><span class="legend-dot" style="background:${c.color}"></span>${c.name}<span style="color:#9ca3af;margin-left:3px">(${count})</span></div>`;
    });
  }
  if(hasRegions){
    if(hasPins) html+=`<hr class="legend-divider">`;
    html+=`<div class="legend-section-title">Regions</div>`;
    regionCategories.forEach(c=>{
      const count=Object.values(regions).filter(r=>r.category===c.name).length;
      const muted=hiddenRegionCats.has(c.name)?'muted':'';
      html+=`<div class="legend-item ${muted}" onclick="toggleRegionCat('${c.name}')"><span class="legend-swatch" style="background:${c.color}44;border-color:${c.color}"></span>${c.name}<span style="color:#9ca3af;margin-left:3px">(${count})</span></div>`;
    });
  }
  el.innerHTML=html;
}

function toggleCat(cat){
  hiddenCats.has(cat)?hiddenCats.delete(cat):hiddenCats.add(cat);
  applyVisibility();renderLegend();
}
function toggleRegionCat(cat){
  hiddenRegionCats.has(cat)?hiddenRegionCats.delete(cat):hiddenRegionCats.add(cat);
  renderStateLayer();
}

// ── CRUD ──────────────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem(DATA_KEY,JSON.stringify(locations));
  localStorage.setItem(CAT_KEY,JSON.stringify(categories));
}

function openSidebar(mode,id){
  document.getElementById('sidebar').classList.add('open');
  if(mode==='add') renderAddForm();
  else if(mode==='list') renderList();
  else if(mode==='edit'&&id) renderEditForm(id);
}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');}

function requireAuth(cb){
  const pass=localStorage.getItem(PASS_KEY);
  if(!pass){cb();return;}
  showModal(`<h3>Enter password</h3><p>This action requires the editor password.</p>
    <label>Password</label><input type="password" id="auth-pass" placeholder="Password">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="checkAuth()">Confirm</button>
    </div>`);
  window._authCb=cb;
}
function checkAuth(){
  if(document.getElementById('auth-pass').value===localStorage.getItem(PASS_KEY)){closeModal();window._authCb&&window._authCb();}
  else toast('Incorrect password','error');
}

function addFormHTML(d){
  const catOpts=categories.map(c=>`<option value="${c.name}" ${d.category===c.name?'selected':''}>${c.name}</option>`).join('');
  return `
    <label>Company / Location Name *</label><input type="text" id="f-name" value="${d.name||''}">
    <label>Address *</label><textarea id="f-addr">${d.address||''}</textarea>
    <button class="btn btn-secondary" style="margin-top:6px;font-size:12px;padding:5px 10px" onclick="geocodeForm()">🔍 Geocode address</button>
    <div id="geocode-status"></div>
    <label>Website</label><input type="url" id="f-web" value="${d.website||''}" placeholder="https://">
    <label>Category</label><select id="f-cat">${catOpts}</select>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitForm()">${editingId?'Save Changes':'Add Pin'}</button>
      <button class="btn btn-secondary" onclick="closeSidebar()">Cancel</button>
      ${editingId?`<button class="btn btn-danger" onclick="confirmDelete('${editingId}')">Delete</button>`:''}
    </div>
    <input type="hidden" id="f-lat" value="${d.lat||''}"><input type="hidden" id="f-lng" value="${d.lng||''}">`;
}
function renderAddForm(p){document.getElementById('sidebar-title').textContent='Add Location';editingId=null;document.getElementById('sidebar-body').innerHTML=addFormHTML(p||{});}
function renderEditForm(id){const l=locations.find(l=>l.id===id);if(!l)return;document.getElementById('sidebar-title').textContent='Edit Location';editingId=id;document.getElementById('sidebar-body').innerHTML=addFormHTML(l);}

async function geocodeForm(){
  const addr=document.getElementById('f-addr').value.trim();
  if(!addr){toast('Enter an address first','error');return;}
  const st=document.getElementById('geocode-status');
  st.textContent='Geocoding…';st.style.color='#6b7280';
  try{
    const r=await geocodeAddr(addr);
    if(r){document.getElementById('f-lat').value=r.lat;document.getElementById('f-lng').value=r.lng;st.textContent='✓ '+r.display;st.style.color='#22c55e';}
    else{st.textContent='Not found. Try adding city/state/zip.';st.style.color='#ef4444';}
  }catch{st.textContent='Geocode error. Check connection.';st.style.color='#ef4444';}
}

function submitForm(){
  requireAuth(()=>{
    const name=document.getElementById('f-name').value.trim();
    const addr=document.getElementById('f-addr').value.trim();
    const web=document.getElementById('f-web').value.trim();
    const cat=document.getElementById('f-cat').value;
    const lat=parseFloat(document.getElementById('f-lat').value)||null;
    const lng=parseFloat(document.getElementById('f-lng').value)||null;
    if(!name||!addr){toast('Name and address are required','error');return;}
    if(!lat||!lng){toast('Geocode the address first','error');return;}
    if(editingId){const i=locations.findIndex(l=>l.id===editingId);locations[i]={id:editingId,name,address:addr,website:web,category:cat,lat,lng};}
    else locations.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),name,address:addr,website:web,category:cat,lat,lng});
    save();renderAll();closeSidebar();toast(editingId?'Location updated':'Location added');
  });
}
function editLoc(id){requireAuth(()=>openSidebar('edit',id));}
function confirmDelete(id){
  const loc=locations.find(l=>l.id===id);if(!loc)return;
  requireAuth(()=>showModal(`<h3>Delete location?</h3><p>Remove <strong style="color:#e8eaf0">${loc.name}</strong>?</p>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-danger" onclick="deleteLoc('${id}')">Delete</button></div>`));
}
function deleteLoc(id){
  closeModal();if(markers[id]){markers[id].remove();delete markers[id];}
  locations=locations.filter(l=>l.id!==id);save();renderAll();closeSidebar();toast('Location deleted');
}

function renderList(){
  document.getElementById('sidebar-title').textContent='All Locations';
  const items=locations.map(l=>`<li class="pin-item" onclick="flyTo('${l.id}')">
    <span class="pin-dot" style="background:${catColor(l.category)}"></span>
    <span class="pin-name">${l.name}</span><span class="pin-cat">${l.category||''}</span></li>`).join('');
  document.getElementById('sidebar-body').innerHTML=`<div style="font-size:12px;color:#6b7280;margin-bottom:8px">${locations.length} locations</div>
    <ul id="pin-list">${items||'<li style="color:#6b7280;font-size:13px;padding:10px">No locations yet.</li>'}</ul>`;
}
function flyTo(id){
  const loc=locations.find(l=>l.id===id);if(!loc||!loc.lat)return;
  map.flyTo([loc.lat,loc.lng],14,{duration:1.2});
  setTimeout(()=>{if(markers[id])markers[id].openPopup();},1300);closeSidebar();
}

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings(){
  showModal(`<h3>Settings</h3>
    <p style="font-size:11px;color:#6b7280">Geocoding uses OpenStreetMap Nominatim — free, no API key needed.</p>
    <label style="display:block;font-size:12px;color:#9ca3af;margin:12px 0 4px">Editor Password <span style="color:#6b7280">(blank = no auth)</span></label>
    <input type="password" id="s-pass" value="${localStorage.getItem(PASS_KEY)||''}" placeholder="Set a password">
    <div class="section-title" style="margin-top:16px">Location Categories</div>
    <p style="font-size:11px;color:#6b7280;margin-bottom:8px">These are loaded from your Excel file. You can also edit them here.</p>
    <div id="s-cats">${categories.map((c,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <input type="color" value="${c.color}" data-cat-color="${i}" style="width:28px;height:28px;padding:1px;border-radius:4px;border:1px solid #2a3045;background:#1e2535;cursor:pointer">
        <input type="text" value="${c.name}" data-cat="${i}" style="flex:1;font-size:12px;padding:5px 8px">
        <button onclick="removeCat(${i})" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:14px">✕</button>
      </div>`).join('')}</div>
    <button class="btn btn-secondary" style="font-size:12px;padding:5px 10px;margin-top:4px" onclick="addCat()">+ Add Category</button>
    ${Object.keys(regions).length?`<div class="section-title" style="margin-top:18px">Regions</div>
      <button class="btn btn-danger" style="font-size:12px;padding:5px 10px" onclick="clearRegions();closeModal()">Clear all regions</button>`:''}
    <div class="modal-actions" style="margin-top:18px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>`);
}
function addCat(){
  const div=document.getElementById('s-cats');const i=div.querySelectorAll('[data-cat]').length;
  const d=document.createElement('div');d.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:6px';
  d.innerHTML=`<input type="color" value="${FALLBACK_COLORS[i%FALLBACK_COLORS.length]}" data-cat-color="new${i}" style="width:28px;height:28px;padding:1px;border-radius:4px;border:1px solid #2a3045;background:#1e2535;cursor:pointer">
    <input type="text" value="New Category" data-cat="new${i}" style="flex:1;font-size:12px;padding:5px 8px">
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:14px">✕</button>`;
  div.appendChild(d);
}
function removeCat(idx){document.querySelector(`[data-cat="${idx}"]`)?.closest('div').remove();}
function saveSettings(){
  const pass=document.getElementById('s-pass').value;
  if(pass)localStorage.setItem(PASS_KEY,pass);else localStorage.removeItem(PASS_KEY);
  const rows=[...document.querySelectorAll('#s-cats [data-cat]')];
  categories=rows.map((inp,i)=>{
    const colorInp=inp.closest('div').querySelector('[data-cat-color]');
    return{name:inp.value.trim(),color:colorInp?colorInp.value:FALLBACK_COLORS[i%FALLBACK_COLORS.length]};
  }).filter(c=>c.name);
  save();renderAll();closeModal();toast('Settings saved');
}
function clearRegions(){regions={};regionCategories=[];hiddenRegionCats=new Set();saveRegions();renderStateLayer();renderLegend();toast('Regions cleared');}

// ── Export ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=locations.map(l=>({name:l.name,address:l.address,website:l.website,category:l.category,lat:l.lat||'',lng:l.lng||''}));
  const csv=rows.map(r=>Object.values(r).map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const header='name,address,website,category,lat,lng\n';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([header+csv],{type:'text/csv'}));
  a.download='locations.csv';a.click();toast('Exported CSV');
}

// ── Format guide ──────────────────────────────────────────────────────────────
function showFormatGuide(){
  showModal(`
    <h3>Excel Format Guide</h3>
    <p>Upload a <strong style="color:#c5c9d6">.xlsx file with 3 tabs</strong> in any order:</p>

    <div class="sheet-guide">
      <strong>Tab 1 — Categories & Colors</strong>
      Name this tab something like <code>Categories</code> or <code>Colors</code>.<br>
      Row 1 = header (skipped). Then for each category:<br>
      • <strong style="color:#c5c9d6">Row A:</strong> Category name in column A<br>
      • <strong style="color:#c5c9d6">Row B:</strong> Leave column A <em>blank</em> but <strong style="color:#c5c9d6">fill the cell</strong> with your desired color<br>
      The fill color of Row B becomes the pin color on the map.<br><br>
      <em>Shortcut:</em> You can also just fill the <em>name cell itself</em> with a color — skip the blank swatch row.
    </div>

    <div class="sheet-guide">
      <strong>Tab 2 — Locations</strong>
      Name this tab something like <code>Locations</code> or <code>Addresses</code>.<br>
      Row 1 = column headers. Required columns:<br>
      • <code>name</code> or <code>company</code><br>
      • <code>address</code><br>
      Optional: <code>website</code>, <code>category</code>, <code>lat</code>, <code>lng</code><br>
      If lat/lng are missing, addresses are geocoded automatically.
    </div>

    <div class="sheet-guide">
      <strong>Tab 3 — States / Regions</strong>
      Name this tab something like <code>Regions</code> or <code>States</code>.<br>
      Row 1 = header (skipped). Columns:<br>
      • <strong style="color:#c5c9d6">Column A:</strong> State name or abbreviation — <strong style="color:#c5c9d6">fill this cell</strong> with the shading color<br>
      • <strong style="color:#c5c9d6">Column B:</strong> Category label (e.g. "Target", "Active")<br>
      The fill color of column A is used as the state shading on the map.
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="closeModal()">Got it</button>
    </div>`);
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function findCol(fields,candidates){
  if(!fields) return null;
  for(const c of candidates){const f=fields.find(f=>f.toLowerCase().includes(c));if(f)return f;}
  return null;
}
function showModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.add('show');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
let toastTimer;
function toast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='show'+(type==='error'?' error':'');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.className='';},3500);
}

renderAll();
</script>
